<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – Worldwide Collab</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    :root{
      --gold:#c9a84c;--gold-light:#e8c96a;--gold-dim:rgba(201,168,76,0.15);
      --dark:#0a0a0f;--dark2:#111118;--dark3:#1a1a24;--dark4:#22222f;
      --text:#e8e8f0;--text-dim:#8888a8;--success:#10b981;--danger:#ef4444;
    }
    html{height:100%;}
    body{
      font-family:'DM Sans',sans-serif;background:var(--dark);
      min-height:100vh;display:flex;align-items:center;justify-content:center;
      padding:20px;position:relative;overflow:hidden;
    }
    body::before{
      content:'';position:fixed;inset:0;
      background:radial-gradient(ellipse 60% 50% at 20% 20%,rgba(201,168,76,0.08) 0%,transparent 60%),
        radial-gradient(ellipse 50% 40% at 80% 80%,rgba(99,102,241,0.06) 0%,transparent 60%);
      pointer-events:none;
    }
    .particles{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
    .p{position:absolute;border-radius:50%;opacity:0;animation:float linear infinite;}
    @keyframes float{
      0%{transform:translateY(100vh) scale(0);opacity:0;}
      10%{opacity:0.35;}90%{opacity:0.15;}
      100%{transform:translateY(-10vh) scale(1.2);opacity:0;}
    }
    .card{
      background:var(--dark2);border:1px solid rgba(201,168,76,0.18);
      border-radius:28px;padding:48px 44px;width:100%;max-width:440px;
      position:relative;z-index:1;
      box-shadow:0 40px 80px rgba(0,0,0,0.6),0 0 0 1px rgba(201,168,76,0.06) inset;
      animation:slideUp 0.5s cubic-bezier(.16,1,.3,1);
    }
    @keyframes slideUp{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}
    .card::before{
      content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);
      width:60%;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);
    }
    .logo-area{text-align:center;margin-bottom:36px;}
    .logo-area img{
      width:72px;height:72px;border-radius:18px;border:2px solid var(--gold-dim);
      box-shadow:0 8px 30px rgba(201,168,76,0.2);object-fit:contain;
      transition:transform 0.4s;
    }
    .logo-area img:hover{transform:scale(1.05) rotate(-2deg);}
    .logo-area h1{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--text);margin-top:14px;}
    .logo-area p{color:var(--gold);font-size:11px;letter-spacing:3px;text-transform:uppercase;margin-top:4px;font-weight:600;}
    .form-title{font-family:'Syne',sans-serif;font-size:26px;font-weight:700;color:var(--text);margin-bottom:28px;text-align:center;}
    .input-group{margin-bottom:18px;}
    .input-group label{display:block;font-size:12px;font-weight:600;color:var(--text-dim);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;}
    .input-wrap{position:relative;}
    .input-wrap input{
      width:100%;padding:14px 18px 14px 46px;background:var(--dark3);
      border:1px solid rgba(255,255,255,0.08);border-radius:12px;
      font-size:15px;font-family:'DM Sans',sans-serif;color:var(--text);
      transition:border-color 0.3s,box-shadow 0.3s;outline:none;
    }
    .input-wrap input::placeholder{color:rgba(136,136,168,0.5);}
    .input-wrap input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,168,76,0.12);}
    .input-wrap .icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-dim);font-size:17px;pointer-events:none;}
    .input-wrap .eye-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:17px;transition:color 0.2s;padding:4px;}
    .input-wrap .eye-btn:hover{color:var(--gold);}
    .forgot{text-align:right;margin-bottom:6px;}
    .forgot a{color:var(--gold);font-size:13px;text-decoration:none;font-weight:500;}
    .forgot a:hover{opacity:0.7;}
    .btn-main{
      width:100%;padding:15px;
      background:linear-gradient(135deg,var(--gold) 0%,#a8762a 100%);
      color:#0a0a0f;border:none;border-radius:12px;
      font-size:15px;font-weight:700;font-family:'Syne',sans-serif;
      cursor:pointer;letter-spacing:0.5px;
      transition:transform 0.2s,box-shadow 0.2s,opacity 0.2s;
      margin-top:8px;box-shadow:0 8px 25px rgba(201,168,76,0.3);
    }
    .btn-main:hover{transform:translateY(-2px);box-shadow:0 12px 35px rgba(201,168,76,0.4);}
    .btn-main:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
    .divider{display:flex;align-items:center;gap:12px;margin:22px 0;color:var(--text-dim);font-size:12px;letter-spacing:1px;text-transform:uppercase;}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,0.07);}
    .btn-google{
      width:100%;padding:13px;background:var(--dark3);
      border:1px solid rgba(255,255,255,0.1);border-radius:12px;
      font-size:14px;font-weight:600;font-family:'DM Sans',sans-serif;color:var(--text);
      cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;
      transition:background 0.3s,border-color 0.3s;
    }
    .btn-google:hover{background:var(--dark4);border-color:rgba(201,168,76,0.3);}
    .toggle-text{text-align:center;margin-top:22px;font-size:13px;color:var(--text-dim);}
    .toggle-text a{color:var(--gold);font-weight:600;cursor:pointer;text-decoration:none;}
    .toggle-text a:hover{opacity:0.7;}
    .alert{padding:12px 16px;border-radius:10px;font-size:13px;margin-top:12px;display:none;line-height:1.5;}
    .alert-error{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.25);color:#fca5a5;}
    .alert-success{background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.25);color:#6ee7b7;}
    .loading-wrap{display:none;text-align:center;margin-top:14px;}
    .spinner{display:inline-block;width:24px;height:24px;border:3px solid rgba(201,168,76,0.2);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;}
    .loading-wrap p{color:var(--text-dim);font-size:13px;margin-top:8px;}
    @keyframes spin{to{transform:rotate(360deg);}}
    @media(max-width:480px){.card{padding:36px 24px;border-radius:20px;}.form-title{font-size:22px;}}
  </style>
</head>
<body>
<div class="particles" id="particles"></div>
<div class="card">
  <div class="logo-area">
    <img src="logo.png" alt="Logo">
    <h1>Worldwide Collab</h1>
    <p>Global Talent Platform</p>
  </div>
  <h2 class="form-title" id="formTitle">Welcome Back</h2>
  <form id="authForm" autocomplete="on">
    <div class="input-group" id="nameGroup" style="display:none">
      <label>Full Name</label>
      <div class="input-wrap">
        <span class="icon">👤</span>
        <input type="text" id="displayName" placeholder="Your full name" autocomplete="name">
      </div>
    </div>
    <div class="input-group">
      <label>Email Address</label>
      <div class="input-wrap">
        <span class="icon">✉️</span>
        <input type="email" id="email" placeholder="you@example.com" required autocomplete="email">
      </div>
    </div>
    <div class="input-group">
      <label>Password</label>
      <div class="input-wrap">
        <span class="icon">🔑</span>
        <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
        <button type="button" class="eye-btn" onclick="togglePass()" id="eyeBtn">👁️</button>
      </div>
    </div>
    <div class="forgot" id="forgotDiv">
      <a href="#" onclick="resetPassword(event)">Forgot password?</a>
    </div>
    <button type="submit" class="btn-main" id="submitBtn">Login</button>
    <div class="loading-wrap" id="loadingWrap"><div class="spinner"></div><p>Please wait…</p></div>
    <div class="alert alert-error" id="errorDiv"></div>
    <div class="alert alert-success" id="successDiv"></div>
  </form>
  <div class="divider"><span>or</span></div>
  <button class="btn-google" onclick="signInWithGoogle()">
    <svg width="20" height="20" viewBox="0 0 24 24">
      <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
      <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
      <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
      <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
    </svg>
    Continue with Google
  </button>
  <p class="toggle-text">
    <span id="toggleText">Don't have an account?</span>
    <a onclick="toggleForm()" id="toggleLink"> Sign Up</a>
  </p>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script>
  // Particles
  const cont=document.getElementById('particles');
  for(let i=0;i<20;i++){
    const p=document.createElement('div'); p.className='p';
    const s=2+Math.random()*4;
    p.style.cssText=`width:${s}px;height:${s}px;left:${Math.random()*100}%;background:rgba(201,168,76,0.5);animation-duration:${8+Math.random()*12}s;animation-delay:${Math.random()*10}s;`;
    cont.appendChild(p);
  }
  const firebaseConfig={
    apiKey:"AIzaSyDcvUZkjQYvUFMmS2FC8k0E9XKNXuzPA4k",
    authDomain:"ww-c-5c5c1.firebaseapp.com",
    projectId:"ww-c-5c5c1",
    storageBucket:"ww-c-5c5c1.firebasestorage.app",
    messagingSenderId:"200600278915",
    appId:"1:200600278915:web:654a42ec7f71e9386e08b6"
  };
  firebase.initializeApp(firebaseConfig);
  const auth=firebase.auth();
  const gp=new firebase.auth.GoogleAuthProvider();
  let isLogin=true;
  auth.onAuthStateChanged(u=>{if(u)window.location.href='index.html';});
  function toggleForm(){
    isLogin=!isLogin;
    document.getElementById('formTitle').textContent=isLogin?'Welcome Back':'Create Account';
    document.getElementById('submitBtn').textContent=isLogin?'Login':'Sign Up';
    document.getElementById('toggleText').textContent=isLogin?"Don't have an account?":'Already have an account?';
    document.getElementById('toggleLink').textContent=isLogin?' Sign Up':' Login';
    document.getElementById('nameGroup').style.display=isLogin?'none':'block';
    document.getElementById('forgotDiv').style.display=isLogin?'block':'none';
  }
  function togglePass(){
    const i=document.getElementById('password');const b=document.getElementById('eyeBtn');
    if(i.type==='password'){i.type='text';b.textContent='🙈';}else{i.type='password';b.textContent='👁️';}
  }
  function setLoading(v){document.getElementById('loadingWrap').style.display=v?'block':'none';document.getElementById('submitBtn').disabled=v;}
  function showErr(m){const e=document.getElementById('errorDiv');e.textContent=m;e.style.display='block';document.getElementById('successDiv').style.display='none';}
  function showOk(m){const e=document.getElementById('successDiv');e.textContent=m;e.style.display='block';document.getElementById('errorDiv').style.display='none';}
  document.getElementById('authForm').addEventListener('submit',async e=>{
    e.preventDefault();
    document.getElementById('errorDiv').style.display='none';
    document.getElementById('successDiv').style.display='none';
    setLoading(true);
    const email=document.getElementById('email').value;
    const pass=document.getElementById('password').value;
    const name=document.getElementById('displayName').value;
    try{
      if(isLogin){
        await auth.signInWithEmailAndPassword(email,pass);
        showOk('Login successful! Redirecting…');
        setTimeout(()=>window.location.href='index.html',900);
      }else{
        const c=await auth.createUserWithEmailAndPassword(email,pass);
        if(name)await c.user.updateProfile({displayName:name});
        showOk('Account created! Redirecting…');
        setTimeout(()=>window.location.href='index.html',900);
      }
    }catch(err){showErr(getMsg(err.code));setLoading(false);}
  });
  function signInWithGoogle(){
    document.getElementById('errorDiv').style.display='none';
    setLoading(true);
    auth.signInWithPopup(gp).then(()=>window.location.href='index.html').catch(err=>{showErr(getMsg(err.code));setLoading(false);});
  }
  function resetPassword(e){
    e.preventDefault();
    const email=document.getElementById('email').value;
    if(!email){showErr('Please enter your email first.');return;}
    auth.sendPasswordResetEmail(email).then(()=>showOk('Reset email sent!')).catch(err=>showErr(getMsg(err.code)));
  }
  function getMsg(c){
    return({'auth/invalid-email':'Invalid email.','auth/user-not-found':'No account found.','auth/wrong-password':'Incorrect password.','auth/email-already-in-use':'Email already in use.','auth/weak-password':'Password must be 6+ chars.','auth/invalid-credential':'Invalid email or password.','auth/too-many-requests':'Too many attempts. Try later.','auth/popup-closed-by-user':'Popup closed.'}[c]||'Something went wrong.');
  }
</script>
</body>
</html>
