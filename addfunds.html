<!DOCTYPE html>
<html>
<head>
<title>Add Funds</title>
</head>

<body style="text-align:center;font-family:Arial">

<h2>Add Funds</h2>

<input type="number" id="amount" placeholder="Enter Amount">
<br><br>

<button onclick="generateQR()">Generate QR</button>

<br><br>

<img id="qr" width="250">

<script>
function generateQR() {

let amount = document.getElementById("amount").value;

if(amount < 10){
alert("Minimum ₹10");
return;
}

let upi = "nextune@upi";
let name = "HaroonSMM";
let order = Math.floor(Math.random()*100000);

let upi_link =
`upi://pay?pa=${upi}&pn=${name}&am=${amount}&cu=INR&tn=Order${order}`;

let qr =
"https://api.qrserver.com/v1/create-qr-code/?size=250x250&data="
+ encodeURIComponent(upi_link);

document.getElementById("qr").src = qr;
}
</script>

</body>
</html>
